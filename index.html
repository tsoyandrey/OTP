<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Future TOTP | Nexus</title>
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --error: #ff4d4d;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(123, 0, 255, 0.05) 0%, transparent 20%);
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* Glass Card */
        .container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 30px; opacity: 0.8; }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 30px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px var(--accent-glow); }

        /* Timer Circle */
        .visual-timer {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; }
        
        circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }

        .bg-circle { stroke: rgba(255, 255, 255, 0.05); }
        .progress-circle {
            stroke: var(--accent);
            stroke-dasharray: 628; /* 2 * PI * R (where R=100) */
            filter: drop-shadow(0 0 8px var(--accent));
        }

        .code-display {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .status-text { font-size: 11px; color: #666; margin-top: 10px; }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 14px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2); }
        button:active { transform: translateY(0); }

        .explanation {
            margin-top: 30px;
            font-size: 11px;
            line-height: 1.6;
            color: #555;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        .warning { color: var(--error); display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Nexus TOTP</h1>

    <textarea id="secret" placeholder="Вставьте Secret Key или URI"></textarea>

    <div class="visual-timer">
        <svg viewBox="0 0 220 220">
            <circle class="bg-circle" cx="110" cy="110" r="100"></circle>
            <circle id="progress" class="progress-circle" cx="110" cy="110" r="100"></circle>
        </svg>
        <div>
            <div id="code" class="code-display">······</div>
            <div id="timeLeft" class="status-text">--s</div>
        </div>
    </div>

    <button id="copyAction">COPY CODE</button>

    <div class="explanation">
        <div id="timeWarning" class="warning">⚠️ Часы на устройстве неточны!</div>
        Синхронизация: <b>UTC Global</b>. Если код не подходит — проверьте время в настройках системы. Часовой пояс значения не имеет.
    </div>
</div>

<script>
/* TOTP Logic */
const base32ToBytes = s => {
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
    s = s.toUpperCase().replace(/=+$/,'').replace(/[^A-Z2-7]/g,'');
    let bits = 0, value = 0, out = [];
    for (let i=0; i<s.length; i++) {
        value = (value << 5) | alphabet.indexOf(s[i]);
        bits += 5;
        if (bits >= 8) {
            out.push((value >>> (bits - 8)) & 0xFF);
            bits -= 8;
        }
    }
    return new Uint8Array(out);
};

async function getTOTP(secret) {
    try {
        if (secret.startsWith('otpauth://')) {
            secret = new URL(secret).searchParams.get('secret');
        }
        const keyBytes = base32ToBytes(secret);
        const epoch = Math.floor(Date.now() / 1000);
        const counter = Math.floor(epoch / 30);
        const buf = new ArrayBuffer(8);
        new DataView(buf).setUint32(4, counter);
        const key = await crypto.subtle.importKey('raw', keyBytes, {name:'HMAC', hash:{name:'SHA-1'}}, false, ['sign']);
        const hmac = new Uint8Array(await crypto.subtle.sign('HMAC', key, new Uint8Array(buf)));
        const offset = hmac[hmac.length - 1] & 0x0f;
        const num = ((hmac[offset] & 0x7f) << 24) | (hmac[offset+1] << 16) | (hmac[offset+2] << 8) | hmac[offset+3];
        return (num % 1000000).toString().padStart(6, '0');
    } catch(e) { return null; }
}

/* UI Logic */
const secretInput = document.getElementById('secret');
const codeDisplay = document.getElementById('code');
const progressCircle = document.getElementById('progress');
const timeLeftText = document.getElementById('timeLeft');

async function updateCode() {
    const code = await getTOTP(secretInput.value);
    if (code) {
        codeDisplay.textContent = code;
        codeDisplay.style.opacity = 1;
    } else {
        codeDisplay.textContent = '······';
        codeDisplay.style.opacity = 0.3;
    }
}

function updateVisuals() {
    const now = Date.now();
    const remaining = 30 - (Math.floor(now / 1000) % 30);
    
    // Update Circle (628 is full circumference)
    const offset = 628 - (remaining / 30) * 628;
    progressCircle.style.strokeDashoffset = offset;
    
    // Update Colors
    if (remaining <= 5) {
        progressCircle.style.stroke = '#ff4d4d';
    } else if (remaining <= 15) {
        progressCircle.style.stroke = '#ffcc00';
    } else {
        progressCircle.style.stroke = '#00f2ff';
    }

    timeLeftText.textContent = remaining + 's';
    if (remaining === 30 || codeDisplay.textContent === '······') updateCode();
}

secretInput.addEventListener('input', updateCode);
document.getElementById('copyAction').addEventListener('click', (e) => {
    navigator.clipboard.writeText(codeDisplay.textContent);
    const btn = e.target;
    btn.textContent = 'COPIED!';
    btn.style.background = '#00f2ff';
    setTimeout(() => {
        btn.textContent = 'COPY CODE';
        btn.style.background = '#fff';
    }, 2000);
});

setInterval(updateVisuals, 1000);
updateVisuals();
</script>
</body>
</html>
